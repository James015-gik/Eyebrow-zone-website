# Netlify Configuration File

[build]
  # Directory to publish (root of the project)
  publish = "."
  
  # No build command needed for static HTML site
  command = ""

# Redirect rules
[[redirects]]
  # Redirect default Netlify subdomain to custom domain (if applicable)
  from = "https://eyebrow-zone.netlify.app/*"
  to = "https://www.yourdomain.com/:splat"
  status = 301
  force = false
  
# Headers for better security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Plugin configuration (optional)
[[plugins]]
  package = "@netlify/plugin-lighthouse"

# Form handling (if you add a contact form later)
# This allows Netlify to handle form submissions
# Just add netlify attribute to your form tag: <form name="contact" netlify>

# Error pages
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  # This ensures SPA-like behavior if needed
